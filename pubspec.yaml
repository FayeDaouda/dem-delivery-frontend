name: delivery_express_mobility_frontend
description: Application mobile Flutter pour Delivery Express Mobility
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP / API
  http: ^1.1.0
  dio: ^5.9.1

  # BLoC Pattern
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.0

  # Stockage sécurisé
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4

  # UI et animations
  flutter_svg: ^2.1.6
  page_transition: ^2.0.9
  animated_text_kit: ^4.2.2
  connectivity_plus: ^7.0.0

  # WebSocket & temps réel
  socket_io_client: ^3.1.2

  # Clavier et maps
  flutter_keyboard_visibility: ^6.0.0
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  
  # Contacts
  flutter_contacts: ^1.1.9

  # UUID pour identifiants uniques
  uuid: ^4.0.0

  # Cache local avec Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  
  # Tests & Mocking
  bloc_test: ^9.1.0
  mockito: ^5.4.4
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/DEM.svg
    - assets/images/logo.png
    - assets/images/logoo.png